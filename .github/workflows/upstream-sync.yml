name: Upstream Sync Check

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check cursor/plugins commits
        id: check-cursor
        run: |
          # Get latest commit from cursor/plugins main branch
          LATEST_CURSOR=$(curl -s https://api.github.com/repos/cursor/plugins/commits/main | jq -r '.sha' | cut -c1-7)
          echo "latest_cursor=$LATEST_CURSOR" >> $GITHUB_OUTPUT
          
          # Get tracked commit from tracking file
          if [ -f .github/UPSTREAM_TRACKING.md ]; then
            TRACKED_CURSOR=$(awk '
              /^## cursor\/plugins$/ { in_section=1; next }
              /^## / && in_section { in_section=0 }
              in_section && /\*\*Commit Tracked:\*\*/ {
                line=$0
                sub(/^.*\*\*Commit Tracked:\*\* /, "", line)
                if (match(line, /[0-9a-fA-F]{7,40}/)) {
                  print substr(line, RSTART, 7)
                }
                exit
              }
            ' .github/UPSTREAM_TRACKING.md)
            if [ -z "$TRACKED_CURSOR" ]; then
              TRACKED_CURSOR="unknown"
            fi
          else
            TRACKED_CURSOR="unknown"
          fi
          
          echo "tracked_cursor=$TRACKED_CURSOR" >> $GITHUB_OUTPUT
          
          if [ "$LATEST_CURSOR" != "$TRACKED_CURSOR" ]; then
            echo "cursor_changed=true" >> $GITHUB_OUTPUT
            echo "::warning::cursor/plugins has new commits (was: $TRACKED_CURSOR, now: $LATEST_CURSOR)"
          else
            echo "cursor_changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Check opencode-handoff releases
        id: check-handoff
        run: |
          # Get latest release from opencode-handoff
          LATEST_HANDOFF=$(curl -s https://api.github.com/repos/joshuadavidthomas/opencode-handoff/releases/latest | jq -r '.tag_name')
          echo "latest_handoff=$LATEST_HANDOFF" >> $GITHUB_OUTPUT
          
          # Get tracked version from tracking file
          if [ -f .github/UPSTREAM_TRACKING.md ]; then
            TRACKED_HANDOFF=$(awk '
              /^## joshuadavidthomas\/opencode-handoff$/ { in_section=1; next }
              /^## / && in_section { in_section=0 }
              in_section && /\*\*Version Tracked:\*\*/ {
                line=$0
                sub(/^.*\*\*Version Tracked:\*\* /, "", line)
                sub(/[[:space:]]*\(.*\)$/, "", line)
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
                print line
                exit
              }
            ' .github/UPSTREAM_TRACKING.md)
            if [ -z "$TRACKED_HANDOFF" ]; then
              TRACKED_HANDOFF="unknown"
            fi
          else
            TRACKED_HANDOFF="unknown"
          fi
          
          echo "tracked_handoff=$TRACKED_HANDOFF" >> $GITHUB_OUTPUT
          
          if [ "$LATEST_HANDOFF" != "$TRACKED_HANDOFF" ]; then
            echo "handoff_changed=true" >> $GITHUB_OUTPUT
            echo "::warning::opencode-handoff has new release (was: $TRACKED_HANDOFF, now: $LATEST_HANDOFF)"
          else
            echo "handoff_changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create tracking issue if changes detected
        if: steps.check-cursor.outputs.cursor_changed == 'true' || steps.check-handoff.outputs.handoff_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const cursorChanged = '${{ steps.check-cursor.outputs.cursor_changed }}' === 'true';
            const handoffChanged = '${{ steps.check-handoff.outputs.handoff_changed }}' === 'true';
            
            let title = 'Upstream sync needed';
            let body = '## Upstream Dependencies Have Changes\n\n';
            
            if (cursorChanged) {
              body += `### cursor/plugins\n- **Last tracked:** ${{ steps.check-cursor.outputs.tracked_cursor }}\n- **Latest:** ${{ steps.check-cursor.outputs.latest_cursor }}\n- **Action needed:** Review SKILL.md for workflow/format changes\n- **Files to check:**\n  - \`continual-learning/SKILL.md\`\n  - \`continual-learning/.cursor-plugin/plugin.json\`\n\n`;
            }
            
            if (handoffChanged) {
              body += `### joshuadavidthomas/opencode-handoff\n- **Last tracked:** ${{ steps.check-handoff.outputs.tracked_handoff }}\n- **Latest:** ${{ steps.check-handoff.outputs.latest_handoff }}\n- **Action needed:** Check for SDK updates and hook pattern changes\n- **Files to check:**\n  - \`src/plugin.ts\`\n  - \`package.json\`\n  - \`CHANGELOG.md\`\n\n`;
            }
            
            body += `## Next Steps\n\n1. [ ] Review upstream changes\n2. [ ] Update dependencies if needed\n3. [ ] Run \`npm run typecheck\`\n4. [ ] Test plugin manually in opencode\n5. [ ] Update \`.github/UPSTREAM_TRACKING.md\` with new sync date\n6. [ ] Close this issue when complete\n\n---\n\n*This issue was auto-generated by the upstream-sync workflow.*`;
            
            // Check for existing open issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });
            
            const existingIssue = issues.data.find(issue => issue.title.includes('Upstream sync needed'));
            
            if (existingIssue) {
              console.log(`Issue already exists: #${existingIssue.number}`);
              // Update existing issue with new info
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body + '\n\n**Updated:** ' + new Date().toISOString()
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['upstream-sync', 'maintenance']
              });
            }
