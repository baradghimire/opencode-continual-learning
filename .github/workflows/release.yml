name: release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., opencode-continual-learning-v0.2.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build package
        run: bun pm pack

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "./*.tgz"

      - name: Create tag and release
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          # Create the tag
          gh api repos/${{ github.repository }}/git/refs -X POST -F ref=refs/tags/$TAG -F sha=${{ github.sha }}
          # Create the release
          gh release create $TAG --title "$TAG" --notes "See CHANGELOG.md for details"

      - name: Upload release assets to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine the tag name from trigger type
          TAG="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          # Upload the tarball to the release
          gh release upload "$TAG" ./*.tgz --clobber

      # npm still needed for trusted publishing, see:
      # https://github.com/oven-sh/bun/issues/15601
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance
