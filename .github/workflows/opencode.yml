name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Select model
        id: select_model
        shell: bash
        run: |
          set -euo pipefail

          FALLBACK_MODEL="opencode/kimi-k2"
          MODELS_URL="https://opencode.ai/zen/v1/models"

          response_file="$(mktemp)"
          if ! curl -fsSL "$MODELS_URL" -o "$response_file"; then
            echo "Could not fetch model list, using fallback model: $FALLBACK_MODEL"
            echo "model=$FALLBACK_MODEL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          selected_model="$(jq -r 'first(.data[]?.id | select(type == "string" and test("-free"; "i"))) // empty' "$response_file")"
          if [ -z "$selected_model" ]; then
            selected_model="$FALLBACK_MODEL"
          fi

          echo "Selected model: $selected_model"
          echo "model=$selected_model" >> "$GITHUB_OUTPUT"

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: ${{ steps.select_model.outputs.model }}
